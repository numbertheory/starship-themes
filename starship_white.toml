format = """
[░▒▓](#f0f0f0)\
$os\
$username$hostname\
[](bg:#e0e0e0 fg:#f0f0f0)\
$directory\
$cmd_duration\
[](fg:#e0e0e0)
$git_branch\
$git_status\
[](fg:#666666 bg:#555555)\
$nodejs\
$python\
[](fg:#555555)\
\n$character"""

[username]
show_always = true
format = '[ $user](bg:#f0f0f0 fg:#090c0c bold)'
disabled = false

[hostname]
ssh_only = false
format = '[@$hostname](bg:#f0f0f0 fg:#090c0c bold)'

[directory]
style = "fg:#2c2c2c bg:#e0e0e0 bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "../"
truncate_to_repo = false

[git_commit]
format = '[\($hash\)](yellow)[$tag](blue bold) '
tag_disabled = false
only_detached = false
tag_symbol = ' 󱩺 '

[git_branch]
format = '[ $symbol$branch(:$remote_branch)](fg:#C9FFE5 bg:#666666)'

[git_status]
format = '([ \[$all_status$ahead_behind\]](fg:#ce2029 bg:#666666 bold))'

[python]
format = '[ $symbol${pyenv_prefix}(${version}) (\($virtualenv\) )](fg:#090c0c bg:#555555)'
symbol = ' '

[nodejs]
format = '[ $symbol$version ](fg:#090c0c bg:#555555)'

[os]
format = "[$symbol](bg:#f0f0f0 fg:#090c0c bold)"
disabled = false

[os.symbols]
Macos = "  "
Mint = " 󰌪 "
Fedora = "  "
NixOS = " "
CachyOS=" "
Ubuntu = ""

[cmd_duration]
min_time = 500
format = '[$duration](bg:#e0e0e0 fg:#090c0c)'
